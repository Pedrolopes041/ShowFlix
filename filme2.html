<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShowFlix</title>
</head>
<Style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Rowdies:wght@300&display=swap');
    * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        a {
            text-decoration: none;
        }
        .nav-bar {
            width: 100%;
            background-color: black;
            height: 50px;
            position: fixed;
        }
        .nav-bar-container {
            width: 80%;
            height: 100%;
            margin: auto;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;

            color:rgba(137, 43, 226, 0.664);
            font-family: 'Rowdies', cursive;
        }
        .nav-bar-items {
           display: flex;
           justify-content: flex-end;
           list-style: none;
    
        }
        .nav-bar-items li {
           padding: 10px;
        }
        .showcase {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 800px;
            background-color: black;
        }
        .showcase-container {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .filme {
            height: 200px;
            display: flex;
            
            background-color: black;
            color: white;

            font-family: 'Zen Kaku Gothic Antique', sans-serif;
        }
        .filme-container {
           display: flex;
           flex-direction: column;
           justify-content: center;
        }
        iframe {
            height: 700px;
        }
</Style>
<body>
    <header>
        <nav class="nav-bar">
            <div class="nav-bar-container">
                <a href="./index.html"><h1>ShowFlix</h1></a>
                <ul class="nav-bar-items">
                    <li>LOGOUT</li>
                    <li>CONFIGURAÇÕES</li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section>
            <div class="showcase">
                <div class="showcase-container">
                    <iframe id="video" controls src="https://www.youtube.com/embed/S8_YwFLCh4U" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </section>
        <section>
            <div class="filme">
                <div class="filme-container">
                    <hr width="400PX" size="10X" color="white">
                    <h2>One Piece</h2>
                    <p>A série centra-se em Monkey D. Luffy, um jovem que, inspirado por seu ídolo de infância e poderoso pirata Shanks, "o Ruivo", sai em uma jornada do mar East Blue para encontrar o famoso tesouro One Piece e proclamar-se o Rei dos Piratas.</p>
                </div>
            </div>
        </section>
    </main>
    
</body>
</html>
