<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShowFlix</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Rowdies:wght@300&display=swap');
    * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        body {
            color: white;
        }
        a {
            text-decoration: none;
            color: white;
        }
        footer {
            background: black;
            color: white;
        }
        /*barra de rolagem*/
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: black;
        }

        ::-webkit-scrollbar-thumb {
            background: gray;
            border-radius: 30px;
        }
        .nav-bar {
            width: 100%;
            background-color: black;
            height: 50px;
            position: fixed;
        }
        .nav-bar-container {
            width: 80%;
            height: 100%;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Rowdies', cursive;
        }
        .nav-bar-items {
           display: flex;
           justify-content: flex-end;
           list-style: none;
    
        }
        .nav-bar-items li {
           padding: 10px;
        }
        .showcase {
            display: flex;
            align-items:flex-end;
            height: 100vh;
            background: url(./boku\ no\ hero2.png) no-repeat center center/cover;

            background-color:rgb(0,0,0,0.5) ;
            background-blend-mode: color ;

        }
        .filmes {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            width: 900px;
        }
        .filme {
            /*efeito glassmorphism = efeito vidro*/
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
        }
        img {
            width: 400px;
            height: 250px;
            margin-bottom: 20px;
        }
        h2 {
            margin-left: 25px;
            font-family: 'Zen Kaku Gothic Antique', sans-serif;
        }
        h3 {
            border-radius: 10px;
            padding: 2px;
            background-color: black;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }
        @media(max-width: 414px) {
            .filmes {
                width: 303px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            img {
                width: 250px;
                height: 170px;
            }
            .filme {
                margin: auto;
            }
            h2 {
                font-size: 20px;
                margin-bottom: 5px;
            }
            .nav-bar-container {
                font-size: 12px;
            }
            p {
                font-size: 10px;
            }
        }
</style>
<body>
    <!--navbar-->
    <header>
        <NAV class="nav-bar">
            <div class ="nav-bar-container">
                <a href="./index.html">
                    <h1>SHOWFLIX</h1>
                </a>
                <ul class="nav-bar-items">
                    <li>LOGOUT</li>
                    <li>CONFIGURAÇÕES</li>
                </ul>
            </div>
        </NAV>
    </header>
    <main>
        <section>
            <div class="showcase">
                <div class="filme">
                    <h2>Assista o Trailer</h2>
                    <div class="filmes">
                        
                        <div>
                            <a href="./filme2.html">
                                <img src="./one piece.jpg">
                            </a>
                            <h3>One Piece</h3>
                        </div>
                        <div>
                            <a href="./filme3.html">
                                <img src="./sword.png">
                            </a>
                            <h3>Sword Arte Online</h3>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!--footer-->
    <footer id="footer">
        <p>copyright 2020 - todos os direitos reservados.</p>
        <p>Feito por Pedro Augusto Lopes Gomes</p>
    </footer>
</body>
</html>
