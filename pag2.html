<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShowFlix</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Rowdies:wght@300&display=swap');
    * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        a {
            text-decoration: none;
        }
        .nav-bar {
            width: 100%;
            background-color: black;
            height: 50px;
            position: fixed;
        }
        .nav-bar-container {
            width: 80%;
            height: 100%;
            margin: auto;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;

            color:#551A8B;
            font-family: 'Rowdies', cursive;
        }
        .nav-bar-items {
           display: flex;
           justify-content: flex-end;
           list-style: none;
    
        }
        .nav-bar-items li {
           padding: 10px;
        }
        .showcase {
            display: flex;
            align-items:flex-end;
            height: 100vh;
            background: url(./DRAGON.jpg) no-repeat center center/cover;

            background-color:rgb(0,0,0,0.5) ;
            background-blend-mode: color ;

        }
        .filme {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            /*efeito glassmorphism = efeito vidro*/
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
        }
        .filmes {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            width: 900px;
        }
        img {
            width: 400px;
            height: 250px;
            margin-bottom: 20px;
        }
        h2 {
            color:#551A8B;
            background: rgba(#255, #255, #255, 2);
            position: relative;
            right: 340px;
            font-family: 'Zen Kaku Gothic Antique', sans-serif;
        }
        iframe {
            height: 550px;
            width: 1349px;
            border-style: none;

        }
        h3 {
            background-color: black;
            color:#551A8B;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }
</style>
<body>
    <!--navbar-->
    <header>
        <NAV class="nav-bar">
            <div class ="nav-bar-container">
                <a href="./index.html">
                    <h1>SHOWFLIX</h1>
                </a>
                <ul class="nav-bar-items">
                    <li>LOGOUT</li>
                    <li>CONFIGURAÇÕES</li>
                </ul>
            </div>
        </NAV>
    </header>
    <main>
        <section>
            <div class="showcase">
                <div class="filme">
                <h2>Assista o Trailer</h2>
                    <div class="filmes">
                        <div>
                            <a href="./filme2.html">
                                <img src="./one piece.jpg">
                            </a>
                            <h3>One Piece</h3>
                        </div>
                        <div>
                            <a href="./filme3.html">
                                <img src="./sword.png">
                            </a>
                            <h3>Sword Arte Online</h3>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
</body>
</html>
