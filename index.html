<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShowFlix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Rowdies:wght@300&display=swap');
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        a {
            text-decoration: none;
        }
        footer {
            background: black;
            color: white;
        }

        /*barra de rolagem*/

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: black;
        }

        ::-webkit-scrollbar-thumb {
            background: white;
            border-radius: 30px;
        }
        .nav-bar {
            width: 100%;
            background-color: black;
            height: 50px;
            position: fixed;
        }
        .nav-bar-container {
            width: 80%;
            height: 100%;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color:rgba(137, 43, 226, 0.664);
            font-family: 'Rowdies', cursive;
        }
        .nav-bar-items {
           display: flex;
           list-style: none;
    
        }
        .nav-bar-items li {
           padding: 10px;
        }
        .perfil {
            background: url(./boku\ no\ hero.png) no-repeat center center/cover;

            /* overlay*/

            background-color:rgb(0,0,0,0.5) ;
            background-blend-mode: color ;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Zen Kaku Gothic Antique', sans-serif;
            
        }
        .perfis {
            width: 700px;
            height: 200px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            /*efeito glassmorphism = efeito vidro*/
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
        }
        h2 {
            text-align: center;
            color: white;

        }
     </style> 
</head>
<body>
    <!--navbar-->
    <NAV class="nav-bar">
        <div class ="nav-bar-container">
            <h1>SHOWFLIX</h1>
            <ul class="nav-bar-items">
                <li>LOGOUT</li>
                <li>CONFIGURAÇÕES</li>
            </ul>
        </div>
    </NAV>
    <!--showcase-->   
    <header class="perfil">
        <div class="perfil-container">
            <div class="perfis">
                <div class="ret">
                    <a href="pag2.html">
                        <img class="imagem" src="./morto.png" alt="pedro">
                    </a>
                    <h2>Pedro Lopes</h2>
                </div>
                <div class="ret" > 
                    <img class="imagem" src="./cavaleiro.png">
                    <h2>Mariana Lopes</h2>
                </div>
                <div class="ret">
                    <img class="imagem" src="./dracula.png">
                    <h2>Mery Lopes</h2>
                </div>
                <div class="ret">
                    <img class="imagem" src="./do-utilizador (1).png">
                    <h2> + perfil</h2>
                </div>
            </div>
        </div>        
    </header>
    <!--footer-->
    <footer id="footer">
        <p>copyright 2020 - todos os direitos reservados.</p>
        <p>Feito por Pedro Augusto Lopes Gomes</p>
    </footer>
</body>
</html>
