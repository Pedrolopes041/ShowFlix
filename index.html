<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOWFLIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Rowdies:wght@300&display=swap');
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        a {
            text-decoration: none;
        }
        body {
            color: white;
        }
        /*barra de rolagem*/
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: black;
        }

        ::-webkit-scrollbar-thumb {
            background: gray;
            border-radius: 30px;
        }
        .nav-bar {
            width: 100%;
            background-color: black;
            height: 35px;
            position: fixed;
        }
        .nav-bar-container {
            width: 80%;
            height: 100%;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rowdies', cursive;
        }
        .perfil {
            background: url(./boku\ no\ hero2.png) no-repeat center center/cover;

            /* overlay*/
            
            background-color:rgb(0,0,0,0.5) ;
            background-blend-mode: color ;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Zen Kaku Gothic Antique', sans-serif;
            
        }
        .perfis {
            width: 800px;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;

        }
        .per-img {
            display: flex;
            flex-direction: column;
            align-items: center;
            
        }
        p {
            background-color: rgb(255,255,255,0.2);
            width: 200px;
            border-radius: 10px;

            display: flex;
            justify-content: center;

            font-size: 25px;
            
        }
        @media(max-width: 414px) {
            .nav-bar-container {
                font-size: 12px;
            }
            .perfis {
                display: flex;
                flex-direction: row;
                justify-content: space-around;
                width: 400px;
            }
            h2 {
                font-size: 15px;
            }
            .imagem {
                height: 110px;
                width: 110px;
            }
            .per-img {
                display: flex;
                flex-direction: column;
            }
            p {
                font-size: 10px;
                width: 100px;
            }
        }
        @media(max-height: 414px) {
            .nav-bar-container {
                font-size: 12px;
            }
            .perfis {
                display: flex;
                flex-direction: row;
                justify-content: space-evenly;
                width: 650px;
            }
            h2 {
                font-size: 15px;
            }
            .imagem {
                height: 100px;
                width: 100px;
            }
            p {
                font-size: 10px;
                width: 100px;
            }

        }
     </style> 
</head>
<body>
    <!--navbar-->
    <NAV class="nav-bar">
        <div class ="nav-bar-container">
            <h1>SHOWFLIX</h1>
        </div>
    </NAV>
    <!--showcase-->   
    <header class="perfil">
        <div class="perfil-container">
            <div class="perfis">
                <div class="per-img">
                    <a href="pag2.html">
                        <img class="imagem" src="./morto.png" alt="pedro">
                    </a>
                    <h2>Pedro Lopes</h2>
                    <p> + Pefil</p>
                </div>
                <div class="per-img"> 
                    <img class="imagem" src="./cavaleiro.png">
                    <h2>Mariana Lopes</h2>
                    <p> Gerenciar contas</p>
                </div>
            </div>
        </div>        
    </header>
</body>
</html>
